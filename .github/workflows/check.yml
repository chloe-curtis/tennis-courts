name: Check Tennis Court Availability

on:
  schedule:
    - cron: "20,50 5-22 * * *"
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit sent.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run availability check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py

      - name: Commit updated sent.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent.json
          git diff --cached --quiet || git commit -m "chore: update sent.json [skip ci]"
          git push
